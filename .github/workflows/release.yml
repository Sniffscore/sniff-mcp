name: release
on:
  push:
    tags: ['v*']
jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write          # OIDC -> PyPI Trusted Publishing (no token)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
  npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # OIDC -> npm Trusted Publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', registry-url: 'https://registry.npmjs.org' }
      - run: npm install -g npm@latest      # recent npm for --provenance
      - working-directory: npm
        run: npm publish --provenance --access public   # token auth + OIDC provenance (public repo)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
